name: Chess Bot - Auto Shorts Upload

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC
    - cron: '0 6 * * *'   # 6 AM UTC
    - cron: '0 10 * * *'  # 10 AM UTC
    - cron: '0 14 * * *'  # 2 PM UTC
  workflow_dispatch:

jobs:
  chess-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib

      - name: Load YouTube credentials
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Create output folder
        run: mkdir -p downloads

      - name: Run Chess Bot
        env:
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: python chess_main.py

      - name: Save video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chess-short-${{ github.run_number }}
          path: downloads/final_video.mp4
          retention-days: 3
