name: Test Tor Engine 5

on:
  workflow_dispatch:

jobs:
  test-tor:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tor + latest yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor
          pip install -U yt-dlp
          echo "✅ Tor + yt-dlp $(yt-dlp --version) installed"

      - name: Start Tor and verify
        run: |
          sudo service tor start
          sleep 20
          nc -z 127.0.0.1 9050 && echo "✅ Tor SOCKS5 ready" || (echo "❌ Tor not ready" && exit 1)
          REAL_IP=$(curl -s https://api.ipify.org)
          TOR_IP=$(curl -s --socks5 127.0.0.1:9050 https://api.ipify.org)
          echo "Real IP : $REAL_IP"
          echo "Tor IP  : $TOR_IP"
          [ "$REAL_IP" != "$TOR_IP" ] && echo "✅ IP rotation working!" || echo "⚠️ Same IP"

      - name: Download NCS song via Tor (search-based, human-like)
        run: |
          sleep $((RANDOM % 10 + 8))
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          yt-dlp \
            --proxy socks5://127.0.0.1:9050 \
            --user-agent "$UA" \
            --extractor-args "youtube:player-client=web,android" \
            --limit-rate 200K \
            --sleep-interval 3 --max-sleep-interval 10 \
            -f bestaudio/best \
            --extract-audio --audio-format wav --audio-quality 0 \
            --no-playlist \
            -o /tmp/test_song.wav \
            "ytsearch1:Elektronomia Sky High NCS"

      - name: Verify result
        run: |
          if [ -f /tmp/test_song.wav ] && [ $(stat -c%s /tmp/test_song.wav) -gt 100000 ]; then
            echo "✅✅ SUCCESS! Song downloaded via Tor — $(du -sh /tmp/test_song.wav)"
          else
            echo "❌ Download failed" && exit 1
          fi
