<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android Music UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Feather Icons (Lucide equivalent) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: #f0f2f5;
      margin: 0;
      padding: 0;
      /* Enforce strict mobile resolution for the recorder */
      width: 540px;
      height: 960px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Root wrapper reproducing the exact React component -->
  <div class="h-full bg-[#f0f2f5] flex items-center justify-center p-4 font-sans text-gray-600">
    
    <!-- Main Container - Mobile Frame Aesthetic -->
    <div class="w-full h-full max-w-sm bg-[#e6e9ef] rounded-[50px] shadow-[20px_20px_60px_#bebebe,-20px_-20px_60px_#ffffff] flex flex-col items-center p-8 relative overflow-hidden border border-white/20">
      
      <!-- Header Info -->
      <div class="mt-8 text-center">
        <p class="text-[10px] tracking-[0.2em] uppercase opacity-50 mb-1">NCS Release</p>
        <h1 class="text-2xl font-bold text-gray-800">{{SONG_NAME}}</h1>
        <p class="text-xs opacity-60">NoCopyrightSounds</p>
      </div>

      <!-- Central Dial Section -->
      <div class="relative mt-12 flex items-center justify-center">
        <!-- Outer Glow/Ring -->
        <div class="absolute w-64 h-64 rounded-full shadow-[inset_10px_10px_20px_#bebebe,inset_-10px_-10px_20px_#ffffff]"></div>
        
        <!-- The Main Knob -->
        <div class="relative w-48 h-48 rounded-full bg-[#e6e9ef] shadow-[15px_15px_30px_#bebebe,-15px_-15px_30px_#ffffff] flex items-center justify-center group cursor-pointer transition-transform">
          
          <!-- Progress Ring (SVG) -->
          <svg class="absolute inset-0 w-full h-full -rotate-90">
            <circle
              id="ringProgress"
              cx="50%"
              cy="50%"
              r="92"
              fill="none"
              stroke="rgba(168, 85, 247, 0.4)"
              stroke-width="4"
              stroke-linecap="round"
              stroke-dasharray="578"
              stroke-dashoffset="578"
              class="transition-all duration-300 ease-linear"
              style="filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6))"
            ></circle>
          </svg>

          <!-- Visualizer Bars -->
          <div class="flex items-end gap-1 h-12" id="visContainer"></div>
        </div>

        <!-- Volume Mini-Indicator -->
        <div class="absolute right-[-40px] flex flex-col items-center">
          <div class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center mb-2">
            <span class="text-[10px] font-bold text-purple-500">80%</span>
          </div>
          <i data-lucide="volume-2" width="14" height="14" class="opacity-40"></i>
        </div>
      </div>

      <!-- Progress Slider -->
      <div class="w-full mt-16 px-4">
        <div class="flex justify-between text-[10px] opacity-40 mb-2">
          <span id="timeNow">00:00</span>
          <span>00:59</span>
        </div>
        <div class="h-1.5 w-full bg-[#d1d9e6] rounded-full shadow-[inset_2px_2px_4px_#bebebe,inset_-2px_-2px_4px_#ffffff] overflow-hidden">
          <div id="progBar" class="h-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)] transition-all duration-300 ease-linear" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Playback Control Sub-Buttons -->
      <div class="flex items-center gap-6 mt-8">
        <button class="p-2 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] active:shadow-inner transition-all">
          <i data-lucide="minus" width="12" height="12"></i>
        </button>
        <div class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[inset_4px_4px_8px_#bebebe,inset_-4px_-4px_8px_#ffffff] flex items-center justify-center">
          <span class="text-xs font-bold text-purple-600">3</span>
        </div>
        <button class="p-2 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] active:shadow-inner transition-all">
          <i data-lucide="plus" width="12" height="12"></i>
        </button>
      </div>
      <p class="text-[10px] uppercase tracking-widest opacity-40 mt-3">Repeat</p>

      <!-- Main Controls Footer -->
      <div class="mt-auto mb-10 flex items-center justify-between w-full px-4">
        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400 hover:text-cyan-400 transition-colors active:shadow-inner">
          <i data-lucide="skip-back" fill="currentColor" class="opacity-60" width="20" height="20"></i>
        </button>

        <button class="w-20 h-20 rounded-full bg-[#e6e9ef] shadow-[8px_8px_16px_#bebebe,-8px_-8px_16px_#ffffff] flex items-center justify-center text-cyan-500 active:shadow-inner transition-all group relative">
          <div class="absolute inset-0 rounded-full shadow-[inset_0_0_15px_rgba(34,211,238,0.3)] animate-pulse"></div>
          <i data-lucide="pause" fill="currentColor" width="32" height="32"></i>
        </button>

        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400 hover:text-cyan-400 transition-colors active:shadow-inner">
          <i data-lucide="skip-forward" fill="currentColor" class="opacity-60" width="20" height="20"></i>
        </button>
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();

    // Visualizer Bars logic
    const vis = document.getElementById('visContainer');
    let bars = [];
    for(let i=0; i<7; i++) {
      let b = document.createElement('div');
      b.className = 'w-1 bg-cyan-400 rounded-full transition-all duration-150';
      b.style.boxShadow = '0 0 10px rgba(34, 211, 238, 0.6)';
      b.style.height = '40%';
      vis.appendChild(b);
      bars.push(b);
    }

    // Animation Loop
    setInterval(() => {
      bars.forEach(b => {
        let h = Math.floor(Math.random() * 60) + 20;
        b.style.height = h + '%';
      });
    }, 150);

    // Progress Logic
    const tDur = 59; 
    let startTime = performance.now();
    const ring = document.getElementById('ringProgress');
    const progBar = document.getElementById('progBar');
    const timeNow = document.getElementById('timeNow');

    function updateUI(now) {
      let elapsed = (now - startTime) / 1000;
      if(elapsed > tDur) elapsed = tDur;
      let p = elapsed / tDur;

      // Linear bar
      progBar.style.width = (p*100) + '%';
      
      // Text time
      let sec = Math.floor(elapsed).toString().padStart(2, '0');
      timeNow.innerText = `00:${sec}`;

      // SVG Ring
      const dash = 578;
      ring.style.strokeDashoffset = dash - (dash * p);

      if(elapsed < tDur) requestAnimationFrame(updateUI);
    }
    requestAnimationFrame(updateUI);
  </script>
</body>
</html>
