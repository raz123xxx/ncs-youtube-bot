<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NCS Shorts UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background-color: #f0f2f5; overflow: hidden; width: 1080px; height: 1920px; font-family: sans-serif; position: relative; }
    #hex-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
    #ui-container { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 2; display: flex; align-items: center; justify-content: center; background: transparent; }
    
    /* Neumorphism tweaks */
    .neu-panel { background: #e6e9ef; box-shadow: 30px 30px 90px #a3a5a9, -30px -30px 90px #ffffff; }
    .neu-button { background: #e6e9ef; box-shadow: 10px 10px 20px #bebebe, -10px -10px 20px #ffffff; }
    .neu-pressed { background: #e6e9ef; box-shadow: inset 10px 10px 20px #bebebe, inset -10px -10px 20px #ffffff; }
    .neu-ring-out { box-shadow: inset 15px 15px 30px #bebebe, inset -15px -15px 30px #ffffff; }
    .neu-ring-in { background: #e6e9ef; box-shadow: 20px 20px 40px #bebebe, -20px -20px 40px #ffffff; }
  </style>
</head>
<body>

  <!-- BACKGROUND: Hexagon Grid -->
  <canvas id="hex-canvas"></canvas>

  <!-- FOREGROUND: Neumorphic Music Player -->
  <div id="ui-container">
    <div class="neu-panel rounded-[80px] flex flex-col items-center p-12 relative overflow-hidden border-2 border-white/40" style="width: 800px; height: 1500px;">
      
      <!-- Header Info -->
      <div class="mt-16 text-center z-10 w-full px-8">
        <p class="text-[20px] tracking-[0.3em] uppercase opacity-50 mb-4 font-bold text-gray-500">NCS Release</p>
        <h1 class="text-5xl font-extrabold text-gray-800 leading-tight">{{SONG_NAME}}</h1>
        <p class="text-2xl mt-4 text-cyan-600 opacity-80 font-bold tracking-widest">NOCOPYRIGHTSOUNDS</p>
      </div>

      <!-- Central Dial Section -->
      <div class="relative mt-32 flex items-center justify-center w-full">
        <!-- Outer Glow/Ring -->
        <div class="absolute rounded-full neu-ring-out" style="width: 500px; height: 500px;"></div>
        
        <!-- The Main Knob -->
        <div class="relative rounded-full neu-ring-in flex items-center justify-center group" style="width: 380px; height: 380px;">
          
          <!-- Progress Ring SVG -->
          <svg class="absolute inset-0 w-full h-full -rotate-90">
            <circle cx="50%" cy="50%" r="180" fill="none" stroke="rgba(34, 211, 238, 0.6)" stroke-width="12" stroke-linecap="round" stroke-dasharray="1131" stroke-dashoffset="300" id="progressRing" style="filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.8)); transition: stroke-dashoffset 0.1s linear;" />
          </svg>

          <!-- Visualizer Bars -->
          <div class="flex items-end gap-3" style="height: 120px;" id="visContainer"></div>
        </div>
      </div>

      <!-- Linear Progress Slider -->
      <div class="w-full mt-32 px-12 z-10">
        <div class="flex justify-between text-2xl font-bold opacity-40 mb-6 text-gray-500">
          <span id="timeNow">00:00</span>
          <span>01:00</span>
        </div>
        <div class="h-4 w-full bg-[#d1d9e6] rounded-full shadow-[inset_4px_4px_8px_#c2c9d6,inset_-4px_-4px_8px_#ffffff] overflow-hidden">
          <div id="progBar" class="h-full bg-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.9)] rounded-full" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="mt-auto mb-20 flex items-center justify-between w-full px-12 z-10">
        <!-- Skip Back -->
        <div class="w-28 h-28 rounded-full neu-button flex items-center justify-center text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="currentColor" opacity="0.6"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
        </div>

        <!-- Play/Pause -->
        <div class="w-40 h-40 rounded-full neu-button flex items-center justify-center text-cyan-500 relative">
          <div class="absolute inset-0 rounded-full shadow-[inset_0_0_30px_rgba(34,211,238,0.4)] animate-pulse"></div>
          <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </div>

        <!-- Skip Forward -->
        <div class="w-28 h-28 rounded-full neu-button flex items-center justify-center text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="currentColor" opacity="0.6"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- NEO-UI DYNAMICS ---
    const vis = document.getElementById('visContainer');
    let bars = [];
    for(let i=0; i<7; i++) {
      let b = document.createElement('div');
      b.className = 'w-3 bg-cyan-400 rounded-full transition-all duration-100 ease-linear';
      b.style.boxShadow = '0 0 20px rgba(34, 211, 238, 0.8)';
      vis.appendChild(b);
      bars.push(b);
    }

    const tDur = 60; // 60 seconds total short duration
    let startTime = performance.now();
    const ring = document.getElementById('progressRing');
    const progBar = document.getElementById('progBar');
    const timeNow = document.getElementById('timeNow');

    function updateUI(now) {
      let elapsed = (now - startTime) / 1000;
      if(elapsed > tDur) elapsed = tDur;
      let p = elapsed / tDur;

      // Update Linear bar
      progBar.style.width = (p*100) + '%';
      
      // Update text time
      let sec = Math.floor(elapsed).toString().padStart(2, '0');
      timeNow.innerText = `00:${sec}`;

      // Update Ring
      const c = 1131; // Circumference
      ring.style.strokeDashoffset = c - (c * p);

      // Random Bouncy Visualizer
      if (Math.random() > 0.2) {
          bars.forEach(b => {
             let h = Math.floor(Math.random() * 80) + 20;
             b.style.height = h + '%';
          });
      }

      if(elapsed < tDur) requestAnimationFrame(updateUI);
    }
    requestAnimationFrame(updateUI);

    // --- HEXAGON BACKGROUND DYNAMICS ---
    const canvas=document.getElementById('hex-canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=1080; canvas.height=1920;
    const W=canvas.width,H=canvas.height, CX=W/2,CY=H/2, BASE_S=40, WALL=224;

    function h2p(q,r){ return{x:CX+BASE_S*(Math.sqrt(3)*q+Math.sqrt(3)/2*r),y:CY+BASE_S*(3/2*r)}; }
    function hexPts(cx,cy,s){ let p=[]; for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);p.push([cx+s*Math.cos(a),cy+s*Math.sin(a)]);} return p; }

    const rawGrid=[];
    for(let q=-15;q<=15;q++){
      for(let r=-15;r<=15;r++){
        const s2=-q-r,dist=Math.max(Math.abs(q),Math.abs(r),Math.abs(s2));
        if(dist>15)continue;
        rawGrid.push({q,r,dist});
      }
    }

    const PUSH_DUR=700,HOLD_OUT=1800,PULL_DUR=650,FLAT1=1200, PUSH_IN=600,HOLD_DEEP=1400,RISE_DUR=650,FLAT2=1200;
    const CYCLE=PUSH_DUR+HOLD_OUT+PULL_DUR+FLAT1+PUSH_IN+HOLD_DEEP+RISE_DUR+FLAT2;

    function easeOutBack(x){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);}
    function easeInOut(x){return x<0.5?4*x*x*x:(1-Math.pow(-2*x+2,3))/2;}
    function easeInQ(x){return x*x;} function easeOutQ(x){return 1-(1-x)*(1-x);}

    function getElev(t,hx){
      const local=((t+hx.startOffset)%CYCLE+CYCLE)%CYCLE;
      let acc=0;
      if(local<(acc+=PUSH_DUR))return easeOutBack(local/PUSH_DUR);
      if(local<(acc+=HOLD_OUT)){const bt=(local-(acc-HOLD_OUT))/HOLD_OUT;return 1+Math.sin(bt*Math.PI*2)*0.05;}
      if(local<(acc+=PULL_DUR)){const pt=(local-(acc-PULL_DUR))/PULL_DUR;return 1-easeInOut(pt);}
      if(local<(acc+=FLAT1))return 0;
      if(local<(acc+=PUSH_IN)){const pt=(local-(acc-PUSH_IN))/PUSH_IN;return -easeInQ(pt);}
      if(local<(acc+=HOLD_DEEP))return -1;
      if(local<(acc+=RISE_DUR)){const pt=(local-(acc-RISE_DUR))/RISE_DUR;return-(1-easeOutQ(pt));}
      return 0;
    }

    const hexes=rawGrid.map(h=>{
      const{x,y}=h2p(h.q,h.r);
      const bright=250-h.dist*5+(Math.random()*8-4);
      return{q:h.q,r:h.r,dist:h.dist,x,y, bright:Math.min(253,Math.max(195,bright)), startOffset:Math.random()*CYCLE,elev:0};
    });

    function drawInward(hx,depth){
      const cx=hx.x,cy=hx.y,s=BASE_S-1.5, pts=hexPts(cx,cy,s), insetS=s*(1-depth*0.07);
      const dx=(CX-cx)*0.03*depth,dy=(CY-cy)*0.03*depth+4.5*depth, ptsIn=hexPts(cx+dx,cy+dy,insetS);

      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.fillStyle=`rgb(${WALL},${WALL},${WALL})`;ctx.fill();

      const faceLight=[[255,255,255,0.18],[245,245,245,0.22],[235,235,235,0.28],[235,235,235,0.28],[248,248,248,0.20],[255,255,255,0.12]];
      for(let i=0;i<6;i++){
        const next=(i+1)%6,[r,g,b,a]=faceLight[i];
        ctx.beginPath();ctx.moveTo(pts[i][0],pts[i][1]);ctx.lineTo(pts[next][0],pts[next][1]);
        ctx.lineTo(ptsIn[next][0],ptsIn[next][1]);ctx.lineTo(ptsIn[i][0],ptsIn[i][1]);
        ctx.closePath();
        const br=Math.round(WALL*(1-a)+r*a),bg=Math.round(WALL*(1-a)+g*a),bb=Math.round(WALL*(1-a)+b*a);
        ctx.fillStyle=`rgba(${br},${bg},${bb},${depth})`;ctx.fill();
        ctx.beginPath();ctx.moveTo(ptsIn[i][0],ptsIn[i][1]);ctx.lineTo(ptsIn[next][0],ptsIn[next][1]);
        ctx.strokeStyle=`rgba(190,190,190,${0.3*depth})`;ctx.lineWidth=1.0;ctx.stroke();
      }
      const fv=Math.round(WALL-depth*18);
      ctx.beginPath();ctx.moveTo(ptsIn[0][0],ptsIn[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(ptsIn[i][0],ptsIn[i][1]);
      ctx.closePath();ctx.fillStyle=`rgb(${fv},${fv},${fv})`;ctx.fill();
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.strokeStyle=`rgba(170,170,170,${0.4*depth})`;ctx.lineWidth=2.0;ctx.stroke();
    }

    function drawOutward(hx,elev){
      const cx=hx.x,cy=hx.y,s=BASE_S-1.5, sx=8*elev,sy=10*elev;
      const pts=hexPts(cx,cy,s),ptsSide=hexPts(cx+sx*0.5,cy+sy*0.5,s),ptsShad=hexPts(cx+sx,cy+sy,s);

      ctx.beginPath();ctx.moveTo(ptsShad[0][0],ptsShad[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(ptsShad[i][0],ptsShad[i][1]);
      ctx.closePath();ctx.fillStyle=`rgba(110,110,110,${0.22*elev})`;ctx.fill();
      ctx.beginPath();ctx.moveTo(ptsSide[0][0],ptsSide[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(ptsSide[i][0],ptsSide[i][1]);
      ctx.closePath();
      const sc=Math.max(155,hx.bright-28);ctx.fillStyle=`rgb(${sc},${sc},${sc})`;ctx.fill();

      const tb=Math.min(255,hx.bright+elev*8);
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.fillStyle=`rgb(${tb},${tb},${tb})`;ctx.fill();
    }

    function drawFlat(hx){
      const pts=hexPts(hx.x,hx.y,BASE_S-1.5);
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.closePath();ctx.fillStyle=`rgb(${hx.bright},${hx.bright},${hx.bright})`;ctx.fill();
      ctx.strokeStyle='rgba(175,175,175,0.5)';ctx.lineWidth=1.2;ctx.stroke();
    }

    function animHex(now){
      ctx.clearRect(0,0,W,H);
      const t=now-startTime;
      hexes.forEach(hx=>{hx.elev=getElev(t,hx);});
      hexes.filter(h=>h.elev<-0.05).sort((a,b)=>a.elev-b.elev).forEach(hx=>drawInward(hx,Math.abs(hx.elev)));
      hexes.filter(h=>h.elev>=-0.05&&h.elev<0.05).forEach(drawFlat);
      hexes.filter(h=>h.elev>=0.05).sort((a,b)=>a.elev-b.elev).forEach(hx=>drawOutward(hx,hx.elev));
      requestAnimationFrame(animHex);
    }
    requestAnimationFrame(animHex);
  </script>
</body>
</html>
