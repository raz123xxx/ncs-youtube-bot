<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android Music UI - Bubble Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --theme-color: #F44336;
    }
    body {
      background: #e6e9ef;
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
    }
    #scale-container {
      width: 400px;
      height: 711.11px;
      transform: scale(2.7);
      transform-origin: top left;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Scale Wrapper to proportionally magnify mobile layout into HD -->
  <div id="scale-container">

    <!-- Main Full-Screen Container -->
    <div class="h-full w-full flex flex-col items-center justify-between pt-4 pb-10 px-6 font-sans text-gray-600 select-none">
      
      <!-- TOP GROUP: Header + Track Info -->
      <div class="w-full flex flex-col items-center">
        <!-- Top Header Section -->
        <div class="w-full flex justify-between items-center max-w-md">
          <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
            <i data-lucide="chevron-left" class="text-gray-400" width="18" height="18"></i>
          </button>
          <div class="text-center">
            <p class="text-[10px] tracking-[0.2em] uppercase opacity-40 font-bold text-gray-400">NCS Release</p>
          </div>
          <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
            <i data-lucide="more-vertical" class="text-gray-400" width="18" height="18"></i>
          </button>
        </div>

        <!-- Track Info -->
        <div class="text-center mt-1 px-8">
          <p class="text-[10px] font-bold tracking-[0.2em] opacity-80 mb-1 uppercase" style="color: var(--theme-color);">NO COPY RIGHT SONG</p>
          <h1 class="text-xl font-bold text-gray-800 tracking-tight leading-tight">Track ｜ Drum & Bass ｜ NCS.wav</h1>
        </div>
      </div>

      <!-- Central Interactive Dial Area -->
      <div class="relative flex items-center justify-center h-[340px] w-[340px]">
        
        <!-- 1. Sunken Track -->
        <div class="absolute w-[296px] h-[296px] rounded-full shadow-[inset_12px_12px_24px_#bebebe,inset_-12px_-12px_24px_#ffffff]"></div>
        
        <!-- 2. SVG Cyan Progress Line -->
        <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
          <svg class="w-[340px] h-[340px] -rotate-90">
            <circle
              cx="170"
              cy="170"
              r="126"
              fill="none"
              stroke="#d1d9e6"
              stroke-width="2"
              opacity="0.2"
            />
            <circle
              id="ringProgress"
              cx="170"
              cy="170"
              r="126"
              fill="none"
              stroke="var(--theme-color)"
              stroke-width="5"
              stroke-linecap="round"
              stroke-dasharray="791.68"
              stroke-dashoffset="791.68"
              class="transition-all duration-100 ease-linear"
            />
          </svg>
        </div>

        <!-- 3. Fitted Bubble -->
        <div 
          id="bubbleContainer"
          class="absolute z-30 transition-all duration-100 ease-linear pointer-events-none"
        >
          <div class="w-[44px] h-[44px] rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-2px_-2px_6px_#ffffff] flex items-center justify-center border border-white/90 ring-1 ring-black/5">
            <span id="bubblePercent" class="text-[10px] font-black leading-none" style="color: var(--theme-color);">0%</span>
          </div>
        </div>
        
        <!-- 4. Centre Circle (Knob) -->
        <div class="relative w-52 h-52 rounded-full bg-[#e6e9ef] shadow-[15px_15px_30px_#bebebe,-15px_-15px_30px_#ffffff] flex items-center justify-center z-20 border border-white/40">
          <div class="flex items-end gap-1.5 h-14" id="visContainer"></div>
        </div>
      </div>

      <!-- Timeline Section -->
      <div class="w-full max-w-sm px-4">
        <div class="flex justify-between text-[10px] font-bold opacity-30 mb-2">
          <span id="timeNow">00:00</span>
          <span>00:59</span>
        </div>
        <div class="h-1.5 w-full bg-[#d1d9e6] rounded-full shadow-[inset_2px_2px_4px_#bebebe,inset_-2px_-2px_4px_#ffffff] overflow-hidden">
          <div id="progBar" class="h-full transition-all duration-100" style="width: 0%; background: var(--theme-color);"></div>
        </div>
      </div>

      <!-- Sub-Controls -->
      <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-6">
          <button class="w-9 h-9 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <i data-lucide="minus" width="12" height="12" class="opacity-60"></i>
          </button>
          <div class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[inset_3px_3px_6px_#bebebe,inset_-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <span class="text-xs font-bold" style="color: var(--theme-color);">3</span>
          </div>
          <button class="w-9 h-9 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <i data-lucide="plus" width="12" height="12" class="opacity-60"></i>
          </button>
        </div>
        <p class="text-[9px] uppercase tracking-[0.3em] font-bold opacity-30 mt-1">Repeat</p>
      </div>

      <!-- Main Controls -->
      <div class="w-full max-w-sm flex items-center justify-between px-6 mb-4">
        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400">
          <i data-lucide="skip-back" fill="currentColor" class="opacity-50" width="20" height="20"></i>
        </button>

        <button class="w-20 h-20 rounded-full bg-[#e6e9ef] shadow-[8px_8px_16px_#bebebe,-8px_-8px_16px_#ffffff] flex items-center justify-center relative" style="color: var(--theme-color);">
          <i data-lucide="pause" fill="currentColor" width="32" height="32"></i>
        </button>

        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400">
          <i data-lucide="skip-forward" fill="currentColor" class="opacity-50" width="20" height="20"></i>
        </button>
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();

    // Visualizer Bars logic
    const vis = document.getElementById('visContainer');
    const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color');
    const AMPLITUDE_DATA = [29, 37, 39, 38, 46, 36, 39, 37, 38, 43, 39, 37, 41, 42, 39, 35, 40, 37, 45, 37, 38, 39, 36, 47, 36, 39, 51, 48, 45, 43, 46, 48, 43, 38, 29, 50, 45, 59, 51, 46, 87, 65, 57, 57, 58, 84, 62, 60, 56, 58, 64, 60, 56, 53, 85, 61, 49, 57, 46, 88, 58, 43, 50, 55, 65, 59, 60, 70, 79, 51, 45, 64, 65, 81, 57, 57, 56, 52, 64, 56, 57, 86, 67, 57, 51, 48, 76, 58, 51, 44, 60, 64, 66, 55, 52, 87, 66, 57, 59, 56, 85, 54, 53, 58, 62, 66, 59, 54, 63, 84, 57, 58, 60, 51, 81, 62, 60, 53, 51, 60, 44, 51, 78, 67, 56, 52, 55, 68, 73, 62, 57, 58, 56, 63, 55, 51, 87, 65, 50, 54, 49, 86, 62, 47, 46, 61, 63, 61, 62, 57, 83, 62, 58, 64, 59, 84, 57, 61, 59, 59, 69, 61, 69, 72, 78, 58, 50, 56, 63, 82, 47, 42, 60, 55, 66, 59, 60, 84, 62, 54, 53, 63, 82, 67, 60, 56, 63, 62, 59, 59, 59, 88, 65, 53, 56, 49, 85, 56, 45, 51, 60, 67, 60, 59, 66, 83, 56, 53, 62, 55, 83, 54, 62, 60, 62, 64, 54, 51, 77, 74, 56, 53, 58, 67, 72, 61, 57, 54, 53, 55, 47, 49, 86, 63, 58, 58, 50, 85, 66, 66, 57, 58, 63, 60, 54, 53, 83, 57, 44, 55, 44, 48, 48, 44, 42, 39, 58, 45, 45, 60, 67, 54, 51, 46, 44, 48, 45, 43, 41, 37, 43, 43, 40, 36, 47, 39, 40, 34, 28, 34, 30, 33, 37, 36, 40, 40, 36, 38, 42, 38, 41, 41, 36, 42, 40, 37, 40, 39, 40, 36, 34, 40, 40, 40, 44, 39, 32, 29, 30, 39, 36, 39, 34, 31, 32, 39, 36, 37, 37, 31, 34, 36, 36, 30, 31, 39, 36, 35, 34, 39, 34, 39, 31, 26, 30, 32, 37, 31, 31, 32, 32, 26, 28, 32, 29, 30, 27, 29, 31, 29, 33, 28, 33, 35, 27, 23, 28, 32, 27, 31, 20, 27, 27, 27, 36, 34, 44, 40, 42, 74, 65, 58, 66, 75, 63, 58, 78, 62, 60, 66, 71, 64, 58, 78, 64, 57, 71, 61, 61, 55, 79, 57, 62, 77, 62, 59, 61, 72, 60, 55, 79, 57, 56, 66, 68, 44, 50, 80, 50, 55, 69, 58, 49, 45, 73, 43, 37, 74, 43, 46, 62, 69, 51, 46, 78, 49, 73, 67, 65, 76, 47, 78, 59, 69, 68, 57, 78, 52, 74, 64, 63, 76, 42, 76, 51, 68, 68, 62, 81, 68, 76, 67, 75, 77, 69, 77, 73, 72, 67, 71, 72, 60, 79, 73, 72, 59, 70, 59, 73, 60, 42, 35, 56, 39, 69, 62, 52, 45, 47, 93, 79, 91, 91, 89, 88, 92, 92, 94, 92, 89, 91, 81, 96, 88, 83, 95, 93, 33, 99, 97, 99, 90, 84, 93, 93, 83, 78, 90, 91, 76, 94, 89, 93, 86, 93, 96, 81, 86, 86, 87, 90, 76, 92, 100, 64, 80, 92, 90, 93, 89, 89, 87, 89, 75, 91, 77, 88, 92, 91, 91, 88, 96, 89, 90, 92, 91, 84, 92, 89, 86, 93, 87, 49, 96, 92, 98, 91, 84, 93, 94, 95, 86, 84, 91, 86, 82, 84, 99, 93, 95, 95, 85, 86, 89, 67, 94, 76, 99, 77, 53, 54, 56, 56, 58, 58, 60, 49, 62, 68, 88, 54];
    
    let bars = [];
    for(let i=0; i<7; i++) {
      let b = document.createElement('div');
      b.className = 'w-1.5 rounded-full transition-all duration-100 ease-out';
      b.style.backgroundColor = themeColor;
      b.style.height = '40%';
      vis.appendChild(b);
      bars.push(b);
    }

    function updateVisualizer(elapsed) {
      if (!AMPLITUDE_DATA || AMPLITUDE_DATA.length === 0) return;
      
      const idx = Math.floor(elapsed * 10); // 10 samples per second
      if (idx >= AMPLITUDE_DATA.length) return;
      
      const amp = AMPLITUDE_DATA[idx];
      
      bars.forEach((b, i) => {
        // Add a slight stagger/offset for each bar to make it look spectral
        const stagger = 1 + (Math.sin(i * 0.5) * 0.2);
        let h = Math.min(100, Math.max(20, amp * stagger));
        b.style.height = h + '%';
      });
    }

    // Progress Logic
    const tDur = 59; 
    let startTime = performance.now();
    const radius = 126;
    const dashArray = 2 * Math.PI * radius;
    
    const ring = document.getElementById('ringProgress');
    const progBar = document.getElementById('progBar');
    const timeNow = document.getElementById('timeNow');
    const bubbleContainer = document.getElementById('bubbleContainer');
    const bubblePercent = document.getElementById('bubblePercent');

    function updateUI(now) {
      let elapsed = (now - startTime) / 1000;
      if(elapsed > tDur) elapsed = tDur;
      let p = elapsed / tDur;
      let percent = Math.floor(p * 100);

      // Linear bar
      progBar.style.width = (p*100) + '%';
      
      // Text time
      let sec = Math.floor(elapsed).toString().padStart(2, '0');
      timeNow.innerText = `00:${sec}`;

      // SVG Ring
      ring.style.strokeDashoffset = dashArray - (dashArray * p);

      // Bubble Position
      const angle = (p * 360) - 90;
      const angleRad = (angle * Math.PI) / 180;
      const x = Math.cos(angleRad) * radius;
      const y = Math.sin(angleRad) * radius;
      
      bubbleContainer.style.transform = `translate(${x}px, ${y}px)`;
      bubblePercent.innerText = `${percent}%`;

      // Update Visualizer bars
      updateVisualizer(elapsed);

      if(elapsed < tDur) requestAnimationFrame(updateUI);
    }
    requestAnimationFrame(updateUI);
  </script>
</body>
</html>
